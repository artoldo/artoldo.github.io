<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="robots" content="noindex, nofollow">
<title>Artoldo CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="gfLink" rel="stylesheet" href="">
<style>
  :root{
    --bg:#ffffff;
    --ink:#0b0b10;
    --muted: rgba(0,0,0,.6);
    --stroke: rgba(0,0,0,.14);
    --shadow: 0 24px 70px rgba(0,0,0,.18);
    --r: 22px;
    --accent: #111111;
    --font:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  html, body { height:100%; }
  body{
    margin:0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    overflow:hidden;
    touch-action:none;
  }
  .deck{
    position:fixed;
    inset:0;
    overflow:hidden;
    background: var(--bg);
  }
  .slide{
    position:absolute;
    overflow:hidden;
    background:#fff;
    transform-origin: 50% 50%;
  }
.el{
    position:absolute;
    border-radius: 18px;
    overflow:hidden;
  }
  .el.txt{
    overflow:visible;
  }
  .txt{
    padding: 14px 16px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    word-break: break-word;
    font-weight: 900;
  }
  .txt.small{
    letter-spacing: -0.01em;
    line-height: 1.35;
    font-weight: 700;
  }
  .media img, .media video{ width:100%; height:100%; object-fit: cover; object-position:center; display:block; }
  .btnEl{
    display:grid; place-items:center;
    padding: 5px 10px;
    border-radius: 999px;
    border:1px solid var(--stroke);
    background: #ffffff;
    box-shadow: 0 18px 45px rgba(0,0,0,.14);
    font-weight: 900;
  }

  .hud{
    position:fixed;
    left:14px; right:14px; bottom:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    z-index: 9999;
    pointer-events:none;
  }
  .pill{
    pointer-events:auto;
    padding: 10px 12px;
    border-radius: 999px;
    border:1px solid rgba(0,0,0,.12);
    background: #ffffff;
    box-shadow: 0 16px 34px rgba(0,0,0,.12);
    font-weight: 900;
    font-size: 12px;
    color: rgba(0,0,0,.7);
    display:flex;
    gap:10px;
    align-items:center;
  }
  .btn{
    border:1px solid rgba(0,0,0,.12);
    background: #ffffff;
    border-radius: 999px;
    padding: 10px 12px;
    font-weight: 900;
    cursor:pointer;
  }
  .btn.primary{ background: var(--accent); color:#fff; border-color: rgba(0,0,0,.2); }
  .btn.icon{ width: 42px; height: 42px; padding: 0; display:grid; place-items:center; }
  .btn.icon svg{ width:18px; height:18px; }

  /* Rotate overlay for small portrait screens */
  .rotateOverlay{
    position:fixed;
    inset:0;
    background: #ffffff;
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 20000;
    text-align:center;
    padding: 28px;
  }
  .rotateOverlay.show{ display:flex; }
  .rotateCard{
    max-width: 420px;
    width: 100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    color: rgba(0,0,0,.78);
  }
  .rotateCard b{ font-size: 16px; letter-spacing:.2px; }
  .rotateCard span{ font-size: 13px; color: rgba(0,0,0,.55); line-height:1.35; }
  .rotateIcon{ width:84px; height:84px; }
  .rotateRow{ display:flex; align-items:center; justify-content:center; gap:100px; }
  .rotatePhone{ width:110px; height:70px; }
  .rotateArrow{ width:90px; height:90px; }


  /* Animations */
  @keyframes md_fadeUp { from{opacity:0; transform: translateY(18px);} to{opacity:1; transform: translateY(0);} }
  @keyframes md_fadeDown { from{opacity:0; transform: translateY(-18px);} to{opacity:1; transform: translateY(0);} }
  @keyframes md_fadeLeft { from{opacity:0; transform: translateX(18px);} to{opacity:1; transform: translateX(0);} }
  @keyframes md_fadeRight { from{opacity:0; transform: translateX(-18px);} to{opacity:1; transform: translateX(0);} }
  @keyframes md_zoomIn { from{opacity:0; transform: scale(.96);} to{opacity:1; transform: scale(1);} }
  @keyframes md_pop { 0%{opacity:0; transform: scale(.92);} 60%{opacity:1; transform: scale(1.02);} 100%{opacity:1; transform: scale(1);} }
  @keyframes md_rotateIn { from{opacity:0; transform: rotate(-4deg) translateY(10px);} to{opacity:1; transform: rotate(0) translateY(0);} }
  @keyframes md_blurIn { from{opacity:0; filter: blur(10px); transform: translateY(14px);} to{opacity:1; filter: blur(0); transform: translateY(0);} }
  @keyframes mdFloat { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-8px);} }
  @keyframes mdKenburns { 0%{transform: scale(1) translate(0,0);} 50%{transform: scale(1.06) translate(-1.2%, -1%);} 100%{transform: scale(1) translate(0,0);} }
</style>
</head>

      <rect x="18" y="22" width="82" height="36" rx="6" stroke="rgba(0,0,0,0.20)" stroke-width="3"/>

    <b>Rotate your device</b>
    <span>For optimal design, view this content on a larger screen.</span><br>

</div>


<div class="hud">
  <div class="pill">
    <button class="btn" id="prev" style="color:black;">◀</button>
    <button class="btn" id="next" style="color:black;">▶</button>
  </div>
  <div class="pill" id="sound" style="display:none;">
    <button class="btn primary icon" id="soundToggle" aria-label="sound"></button>
  </div>
</div>

"h":0.05,"z":288,"style":{"fontFamily":"Inter","color":"#0b0b10","fontSize":18,"align":"left"},"text":"Read Paper","anim":{"type":"float","duration":700,"delay":80},"link":"https://artoldo.github.io/images/Artoldo_2024_Zoroaster-Superstar.pdf"}]},{"id":"slide_d2bdd8e5a94158_19c9f82f1f3","name":"4","bg":{"type":"color","value":"#ffffff"},"elements":[{"id":"el_510024cf2baef8_19c9f8eb1fe","type":"title","x":0.1,"y":0.2,"w":0.8,"h":0.22,"z":126,"style":{"fontFamily":"Inter","color":"#0b0b10","fontSize":72,"align":"left"},"text":"Makers of the documentaries","anim":{"type":"float","duration":700,"delay":80},"link":""},{"id":"el_36ab34dc3f9d48_19c9f8ed941","type":"text","x":0.09597424845269673,"y":0.44833738507779347,"w":0.8004490633289124,"h":0.30026410007072135,"z":235,"style":{"fontFamily":"Inter","color":"rgba(0,0,0,.62)","fontSize":22,"align":"left"},"text":"- C. G. Jung on Alchemy\n- Embassy of the Free Mind\n- The Ritman Library: Amsterdam \n                                                                       \n\n                                                                         and much more...\n","anim":{"type":"float","duration":700,"delay":150},"link":""}]},{"id":"slide_69dd7f031016b8_19d3b079cd3","name":"5","bg":{"type":"color","value":"#ffffff"},"elements":[{"id":"el_2ca631e6393cf_19d3b079cd3","type":"title","x":0.1,"y":0.2,"w":0.8,"h":0.22,"z":320,"style":{"fontFamily":"Inter","color":"#0b0b10","fontSize":72,"align":"left"},"text":"Sara Ferro","anim":{"type":"float","duration":700,"delay":80},"link":""},{"id":"el_43af8dce510c68_19d3b079cd3","type":"text","x":0.09597424845269673,"y":0.44833738507779347,"w":0.8538530811860552,"h":0.5362116991643454,"z":438,"style":{"fontFamily":"Inter","color":"rgba(0,0,0,.62)","fontSize":22,"align":"left"},"text":"Sara Ferro W. (11.05.1977, Milan) studies Sociology and graduates with a specialization in Communication and\nMass Mediology at the University of Milano - Biccoca.\n\nShe is a filmmaker, multidisciplinary artist and writer and forms together with Chris Weil the creative collective ARTOLDO.\n\nPast experiences in the antiquarian book trade inform her work, compelled to read beteween the lines, also in Fraktur.\n\n\n\n","anim":{"type":"float","duration":700,"delay":150},"link":""}]},{"id":"slide_0552b17fc14c2_19d3b0cb8db","name":"6","bg":{"type":"color","value":"#ffffff"},"elements":[{"id":"el_603868a360d76_19d3b0cb8db","type":"text","x":0.08333333333333333,"y":0.08333333333333333,"w":0.8711116039133279,"h":0.762279127805215,"z":425,"style":{"fontFamily":"Inter","color":"rgba(0,0,0,.62)","fontSize":22,"align":"left"},"text":"Sara Ferro W’s publications are Alt Hist! Alta Storia, a bilingual poetry sylloge in English and Italian (Kurze&Pos, 2026), Polyglottolalia (Kurze&Pos, 2025), a poetry collection that seals ten years of video art, code art, and net art for the\nARTOLDO collective, and that also lives an\nautonomous life through a hyper-contemporary\nmultimedia apparatus; the long poem Sineddoche\nTorino (Kurze&Pos, 2023), the first part of a trilogy\non the former industrial triangle GE–MI–TO —\ncomposed of Milan, her city of birth; Genoa, the city\nwhere she found herself; and Turin, the city of her\nmysterious projections — as well as her literary translations\nfrom German of the novelist Max Mohr: Venere in\nPesci. Romanzo astrologico (Bella Germaniae, 2023),\nLa Pagana (Bella Germaniae, 2024),\nand Donna senza remore (Bella Germaniae, 2026).\n","anim":{"type":"float","duration":700,"delay":150},"link":""}]},{"id":"slide_f8ecc9951bc65_19d3b11708f","name":"6","bg":{"type":"color","value":"#ffffff"},"elements":[{"id":"el_eb8dd02a79aa9_19d3b11708f","type":"title","x":0.09999999999999998,"y":0.16666666666666666,"w":0.8,"h":0.22,"z":428,"style":{"fontFamily":"Inter","color":"#0b0b10","fontSize":72,"align":"left"},"text":"Chris Weil","anim":{"type":"float","duration":700,"delay":80},"link":""},{"id":"el_ba71acbe8f1b6_19d3b11708f","type":"text","x":0.09552781988126816,"y":0.3727149964984063,"w":0.8538530811860552,"h":0.5516626149222066,"z":381,"style":{"fontFamily":"Inter","color":"rgba(0,0,0,.62)","fontSize":22,"align":"left"},"text":"Chris Weil (02.03.1988, Bad Nauheim) is a German filmmaker and multimedia artist based in Italy. After graduating as a Film & Video Editor in 2011 at the ARD.ZDF Media Academy in association with the Bayerischer Rundfunk and the IHK, Christian Tobias Weil starts video editing for the German public broadcasting stations (ARD and BR). In 2015, Chris Weil moves to Italy and, in collaboration with Sara Ferro, founds the creative collective ARTOLDO. The duo produces a diverse range of works, including AI, Crypto Art, Digital Art, Arthouse movies, Feature Documentaries, Experimental Films, Moving Images Arts, Video Art, and Virtual Reality experiences.\n","anim":{"type":"float","duration":700,"delay":150},"link":""}]}]};

function updateGoogleFonts(){
  const list = (project.theme.googleFonts || []).map(s => String(s).trim()).filter(Boolean);
  const fams = list.map(f => "family=" + f.replace(/\s+/g, "+")).join("&");
  document.getElementById("gfLink").href = fams ? ("https://fonts.googleapis.com/css2?" + fams + "&display=swap") : "";
}
updateGoogleFonts();

// Rotate overlay (portrait small screens)
const rotateOverlay = document.getElementById("rotateOverlay");
function shouldShowRotate(){
  try{
    const portrait = window.matchMedia && window.matchMedia("(orientation: portrait)").matches;
    const small = Math.min(window.innerWidth||0, window.innerHeight||0) <= 720;
    return portrait && small;
  }catch(_){
    return (window.innerHeight > window.innerWidth) && (Math.min(window.innerWidth||0, window.innerHeight||0) <= 720);
  }
}
function updateRotateOverlay(){
  if(!rotateOverlay) return;
  rotateOverlay.classList.toggle("show", shouldShowRotate());
}
window.addEventListener("resize", updateRotateOverlay);
if(window.matchMedia){
  try{
    window.matchMedia("(orientation: portrait)").addEventListener("change", updateRotateOverlay);
  }catch(_){}
}

const deck = document.getElementById("deck");

let ASPECT = Number((project.meta && project.meta.aspect) || (16/9));
if(!Number.isFinite(ASPECT) || ASPECT <= 0) ASPECT = 16/9;

function layoutSlide(slideEl){
  if(!slideEl) return;
  const vw = window.innerWidth || 1;
  const vh = window.innerHeight || 1;
  let w = vw;
  let h = vw / ASPECT;
  if(h > vh){
    h = vh;
    w = vh * ASPECT;
  }
  slideEl.style.width = w + "px";
  slideEl.style.height = h + "px";
  slideEl.style.left = ((vw - w) / 2) + "px";
  slideEl.style.top  = ((vh - h) / 2) + "px";
}
let idx = 0;
let audio = null;

function px(v){ return (v*100) + "%"; }

function applyAnim(node, el){
  const a = (el.anim || { type:"none", duration:700, delay:0 });
  const type = a.type || "none";
  if(type === "none") return;

  node.style.animationDuration = (Number(a.duration||700)) + "ms";
  node.style.animationDelay = (Number(a.delay||0)) + "ms";
  node.style.animationTimingFunction = "cubic-bezier(.2,.9,.2,1)";
  node.style.animationFillMode = "both";

  if(type === "float"){
    node.style.animationName = "mdFloat";
    node.style.animationDuration = "1600ms";
    node.style.animationIterationCount = "infinite";
    node.style.animationTimingFunction = "ease-in-out";
    return;
  }
  if(type === "kenburns"){
    node.style.animationName = "mdKenburns";
    node.style.animationDuration = "5200ms";
    node.style.animationIterationCount = "infinite";
    node.style.animationTimingFunction = "ease-in-out";
    node.style.transformOrigin = "50% 50%";
    return;
  }
  node.style.animationName = "md_" + type;
}

function render(){
  const s = project.slides[idx];
  if(!s) return;

  deck.innerHTML = "";
  const slide = document.createElement("div");
  slide.className = "slide";
  slide.style.background = (s.bg && s.bg.type === "color") ? s.bg.value : "#fff";

  const els = (s.elements||[]).slice().sort((a,b) => (a.z||0) - (b.z||0));
  els.forEach(el => {
    const node = document.createElement("div");
    node.className = "el";
    node.style.left = px(el.x);
    node.style.top = px(el.y);
    node.style.width = px(el.w);
    node.style.height = px(el.h);
    node.style.zIndex = String(el.z || 1);

    const st = el.style || {};

    if(el.type === "title" || el.type === "text"){
      node.classList.add("txt");
      if(el.type === "text") node.classList.add("small");
      node.style.color = st.color || "#111";
      node.style.fontFamily = (st.fontFamily || project.theme.fontFamily || "Inter");
      node.style.fontSize = (st.fontSize || (el.type==="title"?64:22)) + "px";
      node.style.textAlign = st.align || "left";
      node.innerHTML = String(el.text||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll("\n","<br/>");
    }

    if(el.type === "image"){
      node.classList.add("media");
      const img = document.createElement("img");
      img.src = (st.src || "");
      img.style.objectFit = (String(st.fit||"").trim().toLowerCase()==="fill") ? "cover" : (st.fit || "cover");
      node.appendChild(img);
    }

    if(el.type === "video"){
      node.classList.add("media");
      const vid = document.createElement("video");
      vid.src = (st.src || "");
      vid.playsInline = true;
      vid.loop = true;
      vid.muted = true;
      vid.autoplay = true;
      vid.style.objectFit = (String(st.fit||"").trim().toLowerCase()==="fill") ? "cover" : (st.fit || "cover");
      node.appendChild(vid);
    }

    if(el.type === "button"){
      node.classList.add("btnEl");
      node.style.fontFamily = (st.fontFamily || project.theme.fontFamily || "Inter");
      node.style.fontSize = (st.fontSize || 18) + "px";
      if(el.link){
        const a = document.createElement("a");
        a.href = el.link;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = el.text || "Button";
        a.style.color = "inherit";
        a.style.textDecoration = "none";
        a.style.width = "100%";
        a.style.height = "100%";
        a.style.display = "grid";
        a.style.placeItems = "center";
        node.appendChild(a);
        node.style.cursor = "pointer";
      }else{
        node.textContent = el.text || "Button";
      }
    }

    applyAnim(node, el);
    slide.appendChild(node);
  });

  deck.appendChild(slide);
  
  layoutSlide(slide);
scheduleAutoplay();
  setupAudioUX();
}

let timer = null;
function scheduleAutoplay(){
  clearTimeout(timer);
  if(!(project.playback && project.playback.autoplay)) return;
  const ms = Math.max(800, Number(project.playback.intervalMs || 4500));
  timer = setTimeout(() => next(), ms);
}

function prev(){ idx = (idx - 1 + project.slides.length) % project.slides.length; render(); }
function next(){ idx = (idx + 1) % project.slides.length; render(); }

document.getElementById("prev").onclick = prev;
document.getElementById("next").onclick = next;
window.addEventListener("keydown", (e) => {
  if(e.key === "ArrowLeft") prev();
  if(e.key === "ArrowRight") next();
});

let sx=null, sy=null;
deck.addEventListener("touchstart", (e) => {
  const t = e.touches && e.touches[0];
  if(!t) return;
  sx = t.clientX; sy = t.clientY;
}, {passive:true});
deck.addEventListener("touchend", (e) => {
  if(sx === null) return;
  const t = e.changedTouches && e.changedTouches[0];
  if(!t) return;
  const dx = t.clientX - sx;
  const dy = t.clientY - sy;
  sx=null; sy=null;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) next();
    else prev();
  }
}, {passive:true});

/* Audio icon toggle */
function setupAudioUX(){
  const sound = document.getElementById("sound");
  const btn = document.getElementById("soundToggle");
  if(!(project.audio && project.audio.src)){
    sound.style.display = "none";
    if(audio){ try{ audio.pause(); }catch(_){} audio=null; }
    return;
  }
  sound.style.display = "flex";
  btn.innerHTML = (audio && !audio.paused) ? ICON_SOUND : ICON_MUTE;
}

document.getElementById("soundToggle").onclick = async () => {
  if(!(project.audio && project.audio.src)) return;
  const btn = document.getElementById("soundToggle");
  if(!audio) audio = new Audio(project.audio.src);
  audio.loop = true;
  if(audio.paused){
    try{ await audio.play(); }catch(_){}
  }else{
    audio.pause();
  }
  btn.innerHTML = (!audio.paused) ? ICON_SOUND : ICON_MUTE;
};

window.addEventListener("resize", () => {
  const slide = deck.querySelector(".slide");
  if(slide) layoutSlide(slide);
});

render();
updateRotateOverlay();
</script>
</body>
</html>
