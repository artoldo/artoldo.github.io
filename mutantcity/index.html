<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mutant City – Prototype – ARTOLDO collective</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {margin:0; overflow:hidden; font-family:sans-serif; background:#000;}
#fade{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .5s;z-index:1000;}
#hud{position:fixed;top:12px;left:12px;color:#fff;z-index:999;}
#timer{position:fixed;top:60px;left:12px;color:#fff;z-index:999;}
#score{position:fixed;top:84px;left:12px;color:#fff;z-index:999;}
#menuToggle{position:fixed; top:10px; right:10px; z-index:1000; font-size:28px; color:white; background:rgba(0,0,0,.5); width:44px;height:44px;border-radius:50%; display:flex;align-items:center;justify-content:center; cursor:pointer;}
#ui{position:fixed; top:0; right:0; width:320px; max-height:100vh; overflow:auto; background:rgba(0,0,0,.95); color:white; padding:10px; transform:translateX(100%); transition:.3s; z-index:999; font-size:13px;}
#ui.open{ transform:translateX(0); }
label{font-size:12px;margin-top:10px;display:block;}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:#333;margin-top:4px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:cyan;cursor:pointer;}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:cyan;cursor:pointer;}
button{width:100%;margin-top:10px;padding:8px 0;font-size:14px;font-weight:bold;color:#fff;background:linear-gradient(145deg,cyan,magenta);border:none;border-radius:6px;cursor:pointer;transition:.2s;}
button:hover{background:linear-gradient(145deg,magenta,cyan);}
.a-enter-vr-button { display: none !important; }
#ui {
  padding: 10px 10px 90px 10px; /* top 10px, right 10px, bottom 20px, left 10px */
  box-sizing: border-box;
}
</style>
</head>

<body>
<div id="fade"></div>
<div id="hud">
  Mutations: <span id="levelLabel">0</span><br>
  Edits: <span id="branchLabel">0</span>
</div>
<div id="timer">Time: <span id="timeLabel">0</span></div>
<div id="score">Coins: <span id="scoreLabel">0</span></div>

<div id="menuToggle"><span class="material-icons">settings</span></div>
<div id="ui"></div>

<a-scene fog="type:linear;color:#88aaff;near:1;far:60">
  <a-entity id="rig" position="0 2 0" movement-controls="speed:1.5" look-controls="pointerLockEnabled:false">
    <a-entity camera></a-entity>
  </a-entity>

  <a-sky id="sky" color="#88aaff"></a-sky>
  <a-plane id="floor" rotation="-90 0 0" width="600" height="600" color="#445566" position="0 -4 0"></a-plane>

  <a-entity id="world"></a-entity>
  <a-entity id="flyingBalls"></a-entity>
  <a-entity light="type:ambient;intensity:.4"></a-entity>
  <a-entity light="type:directional;intensity:1" position="1 3 2"></a-entity>
</a-scene>

<script>
const world=document.querySelector('#world');
const rig=document.querySelector('#rig');
const fadeEl=document.getElementById('fade');
const levelLabel=document.getElementById('levelLabel');
const branchLabel=document.getElementById('branchLabel');
const timeLabel=document.getElementById('timeLabel');
const scoreLabel=document.getElementById('scoreLabel');
const skyEl=document.getElementById('sky');
const floorEl=document.getElementById('floor');
const flyingBallsContainer=document.getElementById('flyingBalls');
const scene=document.querySelector('a-scene');
const sliders = {};

const RESET_DISTANCE = 200;
function recenterWorld(){
  const p = rig.object3D.position;
  if(Math.abs(p.x) > RESET_DISTANCE || Math.abs(p.z) > RESET_DISTANCE){
    const offsetX = p.x, offsetZ = p.z;

    // Shift world
    [...world.children].forEach(el => {
      const pos = el.object3D.position;
      pos.x -= offsetX;
      pos.z -= offsetZ;
    });

    // Shift flying balls
    [...flyingBallsContainer.children].forEach(el => {
      const pos = el.object3D.position;
      pos.x -= offsetX;
      pos.z -= offsetZ;
    });

    // Shift portals, collectibles, etc. if needed
    portals.forEach(p => { p.el.object3D.position.x -= offsetX; p.el.object3D.position.z -= offsetZ; });
    collectibles.forEach(c => { c.el.object3D.position.x -= offsetX; c.el.object3D.position.z -= offsetZ; });

    rig.object3D.position.set(0, p.y, 0);
  }
}
setInterval(recenterWorld, 500);

let LEVEL=1, elapsedTime=0, SCORE=0, MUTATIONS=-2, BRANCHES=0;
const portals=[], chunks={}, floaters=[], collectibles=[], flyingBalls=[];

// Genome and variables
let genome={
  density:0.9, height:0.8, hue:0.5, chaos:0.5, portals:0.3,
  floaters:0.3, floaterColor:0.5, cylinderAmount:0.3, cylinderColor:0.5,
  sky:0.5, floor:0.5, fogDensity:0.3, ballsAmount:0.3, ballsColor:0.5,
  octagonAmount:0.3
};

const PARAMS = Object.keys(genome);

// Display names for sliders (custom labels)
const DISPLAY_NAMES={
  density:"City Actractiveness Grade",
  height:"City Speculation Grade",
  hue:"City Danger & Safety Grade",
  chaos:"System Turbulence & Stability",
  portals:"System Permutativeness",
  floaters:"Novelty Creation & Productivity",
  floaterColor:"Conservation & Progress Tendency",
  cylinderAmount:"Machine Solidarity - A(I)gency Housing",
  cylinderColor:"Machine Sensitivity - Function Effectiveness",
  sky:"Future Acceptance",
  floor:"Past Heritage",
  fogDensity:"Singularity Chance - Immersiveness",
  ballsAmount:"Interdipendent Human-Machine Activity",
  ballsColor:"Symbolic Interactionism",
  octagonAmount:"Capitalism Virtual Realism"
};

// Build UI sliders + button
function buildUI(){
  const ui=document.getElementById("ui");
  ui.innerHTML="<br><br><b>Mutant City – System Settings</b><br>";

PARAMS.forEach(param=>{
  const label=document.createElement("label");
  label.innerText = DISPLAY_NAMES[param] || param;

  const slider=document.createElement("input");
  slider.type="range"; slider.min=0; slider.max=1; slider.step=.01;
  slider.value=genome[param];

  // store reference
  sliders[param] = slider;

  slider.oninput=()=>{
    genome[param]=parseFloat(slider.value);
    resetWorld();
    BRANCHES++;
    branchLabel.textContent = BRANCHES;
  };

  ui.appendChild(label);
  ui.appendChild(slider);
});

  <!-- Save Settings -->
const saveBtn=document.createElement("button");
saveBtn.innerText="Save Settings";
saveBtn.onclick=saveGenomeJSON;
ui.appendChild(saveBtn);

const loadBtn=document.createElement("button");
loadBtn.innerText="Load Settings";
ui.appendChild(loadBtn);

let fileInput = document.getElementById("fileInput");
if(!fileInput){
  fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = ".json";
  fileInput.id = "fileInput";
  fileInput.style.display = "none";
  fileInput.addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = JSON.parse(ev.target.result);
        // Update genome values safely
        PARAMS.forEach(p=>{ if(p in data) genome[p]=parseFloat(data[p]); });
        // Update sliders to reflect loaded values
        PARAMS.forEach(p=>{
          const slider = document.querySelector(`input[type=range][value='${genome[p]}']`);
          if(slider) slider.value = genome[p];
        });
        resetWorld();
      }catch(err){
        alert("Invalid JSON file");
      }
    };
    reader.readAsText(file);
  });
  document.body.appendChild(fileInput);
}

loadBtn.onclick = ()=> fileInput.click();

// Save function
function saveGenomeJSON(){
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(genome, null, 2));
  const dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", dataStr);
  dlAnchor.setAttribute("download", "genome_settings.json");
  document.body.appendChild(dlAnchor);
  dlAnchor.click();
  dlAnchor.remove();
}
  
  const rand=document.createElement("button");
  rand.innerText="Randomize World";
  rand.onclick=randomizeWorld;
  ui.appendChild(rand);
}

// Toggle menu
document.getElementById("menuToggle").onclick=()=>{
  document.getElementById("ui").classList.toggle("open");
  ui.style.height = "auto";
};

// ---------------- RANDOMIZE ----------------
function randomizeWorld(){
  PARAMS.forEach(p=>{
    genome[p]=Math.random();

    // update slider UI in real-time
    if(sliders[p]){
      sliders[p].value = genome[p];
    }
  });

  resetWorld();

  MUTATIONS++;
  levelLabel.textContent = MUTATIONS + 1;
}

// ---------------- RESET WORLD ----------------
function resetWorld(){
  portals.length=0; floaters.length=0; collectibles.length=0; flyingBalls.length=0;
  Object.keys(chunks).forEach(k=>delete chunks[k]);
  world.innerHTML=''; flyingBallsContainer.innerHTML='';
  updateChunks();
}

// ---------------- WORLD GENERATION ----------------
const CHUNK_SIZE=40, RENDER_DISTANCE=2, SAFE_SPAWN_RADIUS=5;
function hashSeed(x,z,level){return (x*374761393+z*668265263+level*912367421)>>>0;}
function seededRandom(seed){let s=seed; return function(){s^=s<<13;s>>>=0;s^=s>>>17;s>>>=0;s^=s<<5;s>>>=0; return (s>>>0)/4294967296;}}

function makeChunk(x,z){
  const key=`${x},${z},L${LEVEL}`;
  if(chunks[key]) return;
  const rnd=seededRandom(hashSeed(x,z,LEVEL));

  // Box buildings
  const count=Math.floor(genome.density*40);
  for(let i=0;i<count;i++){
    const bx=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const bz=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    if(x===0 && z===0 && Math.hypot(bx,bz)<SAFE_SPAWN_RADIUS) continue;
    const h=Math.pow(rnd(),2)*genome.height*20+2;
    const b=document.createElement('a-box');
    b.setAttribute('position',`${bx} ${h/2} ${bz}`);
    b.setAttribute('width',1.2); b.setAttribute('depth',1.2); b.setAttribute('height',h);
    b.setAttribute('color',`hsl(${(x*40+z*20+LEVEL*30+genome.hue*360)%360},70%,60%)`);
    b.setAttribute('material','transparent:true;opacity:0.7');
    world.appendChild(b);
  }

  // Cylinder buildings
  const cylCount=Math.floor(genome.cylinderAmount*15);
  for(let i=0;i<cylCount;i++){
    const bx=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const bz=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const h=Math.pow(rnd(),2)*genome.height*20+2;
    const c=document.createElement('a-cylinder');
    c.setAttribute('position',`${bx} ${h/2} ${bz}`);
    c.setAttribute('radius',0.6); c.setAttribute('height',h);
    c.setAttribute('color',`hsl(${genome.cylinderColor*360},70%,50%)`);
    c.setAttribute('material','transparent:true;opacity:0.6');
    world.appendChild(c);
  }

  // Floaters
  for(let i=0;i<Math.floor(genome.floaters*10);i++){
    const f=document.createElement('a-box');
    f.setAttribute('width',1); f.setAttribute('height',1); f.setAttribute('depth',1);
    const posX=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const posZ=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const posY=10+Math.random()*50;
    const hue=Math.random()*360*genome.floaterColor;
    f.setAttribute('position',`${posX} ${posY} ${posZ}`);
    f.setAttribute('color',`hsl(${hue},80%,60%)`);
    f.setAttribute('rotation','0 0 0');
    f.setAttribute('animation','property: rotation; to: 360 0 0; loop: true; dur: 10000; easing: linear'); // X-axis only
    world.appendChild(f);
    floaters.push({el:f, baseY:posY, speed:0.002 + Math.random()*0.003});
  }

  // Portals
  if(rnd()<genome.portals){
    const px=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const pz=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const portal=document.createElement('a-torus');
    portal.setAttribute('position',`${px} 0.5 ${pz}`);
    portal.setAttribute('radius',1.5); portal.setAttribute('radius-tubular',0.12);
    portal.setAttribute('rotation','90 0 0');
    portal.setAttribute('material',`color:hsl(${Math.random()*360},80%,60%);emissive:hsl(${Math.random()*360},80%,60%);transparent:true;opacity:0.5`);
    world.appendChild(portal);
    portals.push({el:portal, x:px, y:0.5, z:pz, hover:Math.random()*0.005});
  }

  // Octagons (X-axis rotation)
  const octCount=Math.floor(1+genome.octagonAmount*3);
  for(let i=0;i<octCount;i++){
    const ox=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const oz=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const oct=document.createElement('a-octahedron');
    oct.setAttribute('position',`${ox} 1 ${oz}`);
    oct.setAttribute('radius',1);
    oct.setAttribute('color','yellow');
    oct.setAttribute('animation','property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear');
    world.appendChild(oct);
    collectibles.push({el:oct, x:ox, y:1, z:oz, collected:false});
  }

  // Flying balls
  const ballsCount=Math.floor(1+genome.ballsAmount*5);
  for(let i=0;i<ballsCount;i++){
    const fx=x*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const fz=z*CHUNK_SIZE+(rnd()-0.5)*CHUNK_SIZE;
    const fy=1+Math.random()*5;
    const ball=document.createElement('a-sphere');
    ball.setAttribute('radius',0.5);
    ball.setAttribute('position',`${fx} ${fy} ${fz}`);
    const hue=Math.random()*360*genome.ballsColor;
    ball.setAttribute('color',`hsl(${hue},80%,60%)`);
    flyingBallsContainer.appendChild(ball);
    flyingBalls.push({el:ball, dirX:Math.random()>0.5?0.05:-0.05, dirZ:Math.random()>0.5?0.05:-0.05});
  }

  chunks[key]=true;
}

function updateChunks(){
  const p = rig.object3D.position;
  const cx = Math.floor(p.x / CHUNK_SIZE);
  const cz = Math.floor(p.z / CHUNK_SIZE);

  // Generate chunks around player
  for(let x = cx - RENDER_DISTANCE; x <= cx + RENDER_DISTANCE; x++){
    for(let z = cz - RENDER_DISTANCE; z <= cz + RENDER_DISTANCE; z++){
      makeChunk(x, z);
    }
  }

  // Unload distant chunks
  const MAX_DISTANCE = RENDER_DISTANCE + 1;
  Object.keys(chunks).forEach(key=>{
    const [x,z] = key.split(',').map(Number);
    if(Math.abs(x - cx) > MAX_DISTANCE || Math.abs(z - cz) > MAX_DISTANCE){
      [...world.children].forEach(el=>{
        const pos = el.getAttribute('position');
        if(!pos) return;
        const ex = Math.floor(pos.x / CHUNK_SIZE);
        const ez = Math.floor(pos.z / CHUNK_SIZE);
        if(ex === x && ez === z) el.parentNode.removeChild(el);
      });
      delete chunks[key];
    }
  });

  // Update sky, floor, fog
  skyEl.setAttribute('color', `hsl(${genome.sky*360},50%,${genome.sky===0?0:50}%)`);
  floorEl.setAttribute('color', `hsl(${genome.floor*360},30%,${genome.floor===0?0:30}%)`);
  scene.setAttribute('fog', 'color:'+skyEl.getAttribute('color')+',near:1,far:'+(20+genome.fogDensity*100));
}

function updateFloor(){
  const p = rig.object3D.position;
  floorEl.setAttribute('position', `${p.x} -4 ${p.z}`);
}
setInterval(updateFloor,100);


// ---------------- INTERACTIONS ----------------
function checkInteractions(){
  const p=rig.object3D.position;
  for(let i=0;i<portals.length;i++){
    const portal=portals[i];
    const dx=p.x-portal.x; const dz=p.z-portal.z;
    if(Math.sqrt(dx*dx+dz*dz)<2){
      LEVEL++; fadeEl.style.opacity=1;
      randomizeWorld();
      rig.setAttribute('position','0 2 0');
      setTimeout(()=>fadeEl.style.opacity=0,300);
      break;
    }
  }
  collectibles.forEach(c=>{
    if(c.collected) return;
    const dx=p.x-c.x; const dz=p.z-c.z;
    if(Math.sqrt(dx*dx+dz*dz)<1.5){
      c.collected=true; c.el.parentNode.removeChild(c.el);
      SCORE+=10; scoreLabel.textContent=SCORE;
    }
  });
}

// ---------------- ANIMATION ----------------
function animate(){
  const now = performance.now();

portals.forEach(p => {
    const pos = p.el.object3D.position;
    pos.y = 0.5 + Math.sin(performance.now() * p.hover) * 0.5;
});

  // Floaters oscillate in Y
  floaters.forEach(f => {
    f.el.object3D.position.y = f.baseY + Math.sin(now * f.speed) * 10;
  });

  // Flying balls move in X/Z
  flyingBalls.forEach(b => {
    const pos = b.el.object3D.position;
    pos.x += b.dirX;
    pos.z += b.dirZ;
  });

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ---------------- TIMERS ----------------
setInterval(()=>{ elapsedTime++; timeLabel.textContent=elapsedTime; },1000);
setInterval(checkInteractions,200);
setInterval(updateChunks,333);

// ---------------- INIT ----------------
buildUI();
randomizeWorld(); // On load
</script>

<script>
const toggle = document.getElementById('menuToggle');
const icon = toggle.querySelector('.material-icons');

toggle.addEventListener('click', () => {
  toggle.classList.toggle('open');
  if(toggle.classList.contains('open')){
    icon.style.transform = 'rotate(45deg)';
  } else {
    icon.style.transform = 'rotate(0deg)';
  }
  icon.style.transition = 'transform 0.4s ease';
});
</script>

</body>
</html>
